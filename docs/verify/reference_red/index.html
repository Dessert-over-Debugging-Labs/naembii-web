<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>새 기준: 깃허브 app.html · 레드 테마 · 틴트 꺼짐 · 토글 제거</title>
<style>
  :root{--bg:#F5F5F7;--surface:#fff;--ink:#1A1A1C;--gray:#6b6b70;--line:#e2e2e6;--brand:#EF5A3C;--brand-soft:#FDEBE6}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.6 -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;word-break:keep-all}
  .wrap{max-width:1000px;margin:0 auto;padding:28px 18px 64px}
  h1{font-size:22px;margin:0 0 6px}
  .sub{color:var(--gray);margin:0 0 8px;font-size:14px}
  .note{background:var(--brand-soft);border-left:4px solid var(--brand);border-radius:8px;padding:12px 14px;margin:14px 0 24px;font-size:14px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}
  .card .lab{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--brand)}
  .card .desc{font-size:12px;color:var(--gray);margin-bottom:8px}
  .card img{width:100%;height:auto;border-radius:10px;border:1px solid var(--line)}
  .spec{display:inline-block;background:var(--brand);color:#fff;border-radius:999px;padding:2px 12px;font-size:12px;font-weight:600;margin-right:6px}
</style>
</head>
<body>
<div class="wrap">
  <h1>새 Figma 이식 기준 <span class="spec">레드 #EF5A3C</span><span class="spec" style="background:#8a8a90">틴트 OFF</span></h1>
  <p class="sub">소스: 깃허브 origin/main <code>app.html</code> · 테마=토마토(레드) · 배경 틴트 꺼짐(#F5F5F7) · 라이트 모드</p>
  <div class="note"><b>포함 규칙:</b> 순수 앱 화면만 이식합니다. 테마 스위처 바·틴트/소리/모드 토글·dev-timer 등 <b>개발용 오버레이는 모두 제외(삭제)</b>합니다. 화면 8개(cookbook·tipWrite는 이 버전에 없음).<br><b>틴트:</b> 일반 화면 = 틴트 OFF(중립 #F5F5F7) · <b>조리 과정(cook·cook2·cook3) = 틴트 ON(브랜드 틴트 배경)</b>.</div>
  <div class="grid" id="g"></div>
</div>
<script>
  const views=[["home","홈 (나의 레시피 2열 그리드 + FAB)"],["detail","레시피 상세"],["cook3","조리 모드(신·주력)"],["complete","완성"],["cook","조리 모드(구)"],["cook2","핸즈프리(구)"],["loading","분석 로딩"],["reviews","후기"]];
  const g=document.getElementById("g");
  views.forEach(([v,d])=>{const c=document.createElement("div");c.className="card";c.innerHTML=`<div class="lab">${v}</div><div class="desc">${d}</div><img loading="lazy" src="./ref_${v}.png" alt="${v}">`;g.appendChild(c);});
</script>
</body>
</html>
